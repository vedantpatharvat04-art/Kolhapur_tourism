<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallary</title>
    <style>

        body{
            margin: 0;
            padding: 0;
            background-color: rgb(12,59,141);
        }
        section{
            max-width: 800px;
            margin: 40px auto;
            padding: 40px 40px;
            background-color: rgb(4, 33,33);
        }
        section h2{
            text-align: center;
            color: chartreuse;
            font-size: 35px;
            margin-bottom: 20px;
            letter-spacing: 5px;
            font-weight: bold;
        }
        .image_gallary{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
        }
        .image_gallary img{
            width: 100%;
            height: 240px;
            object-fit: fill;
            border-radius: 8px;
            box-shadow: 3px 3px 10px black ;
            transition: transform 0.3 ease-in;
        }
        .image_gallary img:hover{
            transform: scale(1.20);
        }
        @media (max-width:768px){

            .image_gallary{
                grid-template-columns: repeat(2,1fr);
            }

        }
        @media (max-width:480px){
            .image_gallary{
                grid-template-columns: repeat(1,1fr);
            }
        }

    </style>
</head>
<body>
    <section>

        <h2>Explore Kolhapur</h2>

        <div class="image_gallary">
            <img src="./download (1).jpeg" alt="">
            <img src="./download (2).jpeg" alt="">
            <img src="./download (3).jpeg" alt="">
            <img src="./download (4).jpeg" alt="">
            <img src="./download (5).jpeg" alt="">
            <img src="./download (6).jpeg" alt="">
            <img src="./download (7).jpeg" alt="">
            <img src="./download (8).jpeg" alt="">
            <img src="./images.jpeg" alt="">
            
        </div>

    </section>
    

</body>
</html>
